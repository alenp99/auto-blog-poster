name: Auto Blog Publisher

on:
  # Every 4 days at 8 AM Sydney time (UTC+11 = 9 PM UTC previous day)
  # Runs on the 1st, 5th, 9th, 13th, 17th, 21st, 25th, 29th of each month
  schedule:
    - cron: "0 21 1,5,9,13,17,21,25,29 * *"

  repository_dispatch:
    types: [generate-blog]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger blog generation on dashboard
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: |
          echo "Triggering blog generation at $DASHBOARD_URL/api/generate"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$DASHBOARD_URL/api/generate" \
            -H "Content-Type: application/json")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "Response: $BODY"
          echo "Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Generation triggered successfully"
          else
            echo "Failed to trigger generation"
            exit 1
          fi
