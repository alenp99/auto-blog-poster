name: Auto Blog Publisher

on:
  repository_dispatch:
    types: [generate-blog]

  workflow_dispatch:
    inputs:
      site_filter:
        description: "Optional: only generate for a specific site name"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate and publish blog posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SYNTHERA_BLOG_API_KEY: ${{ secrets.SYNTHERA_BLOG_API_KEY }}
          TECHFUTURE_BLOG_API_KEY: ${{ secrets.TECHFUTURE_BLOG_API_KEY }}
          TRIGGER_SOURCE: ${{ github.event_name }}
        run: npx ts-node scripts/generate_and_publish_blog.ts

      - name: Save run log
        env:
          TRIGGER_SOURCE: ${{ github.event_name }}
        run: npx ts-node scripts/save_run_log.ts

      - name: Commit cache and content updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/cache/ content/ output/
          git diff --cached --quiet || git commit -m "chore: auto-publish blog posts [$(date -u +%Y-%m-%d)]"
          git push
